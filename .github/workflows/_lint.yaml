---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Lint

on:
  workflow_call:

permissions:
  actions: write
  contents: read
  security-events: write

jobs:
  lint:
    name: MegaLinter
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-lint-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Run MegaLinter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: ${{ github.event_name != 'pull_request' }}
        run: ./lint.sh --ci

      - name: Upload SARIF to GitHub Security
        if: >-
          (success() || failure())
          && hashFiles('megalinter-reports/megalinter-report.sarif') != ''
          && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@05b1a5d28f8763fd11e77388fe57846f1ba8e766
        with:
          sarif_file: megalinter-reports/megalinter-report.sarif
