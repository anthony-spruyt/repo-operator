---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Trivy Container Image Scan

on:
  workflow_call: {}

permissions:
  contents: read
  packages: read
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  discover-images:
    name: Discover Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.discover.outputs.images }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          sparse-checkout: .trivy-images.yaml
          sparse-checkout-cone-mode: false

      - name: Read image list from config
        id: discover
        run: |
          CONFIG=".trivy-images.yaml"

          if [ ! -f "$CONFIG" ]; then
            echo "No $CONFIG found, skipping image scanning"
            echo "images=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IMAGES=$(yq -o=json -I=0 '.images // []' "$CONFIG")

          COUNT=$(echo "$IMAGES" | jq 'length')
          echo "Found $COUNT images in $CONFIG"
          echo "$IMAGES" | jq .

          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"

  scan-images:
    name: Scan ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: discover-images
    if: needs.discover-images.outputs.images != '[]'
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover-images.outputs.images) }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image exists
        id: check-image
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          IMAGE_REF="${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/${IMAGE}:latest"
          if docker manifest inspect "$IMAGE_REF" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image exists: $IMAGE_REF"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Image not found: $IMAGE_REF"
          fi

      - name: Detect Trivy ignore file
        id: trivyconfig
        if: steps.check-image.outputs.exists == 'true'
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          if [ -f "${IMAGE}/.trivyignore" ]; then
            echo "ignorefile=${IMAGE}/.trivyignore" >> "$GITHUB_OUTPUT"
            echo "Using per-image ignore: ${IMAGE}/.trivyignore"
          elif [ -f ".trivyignore.yaml" ]; then
            echo "ignorefile=.trivyignore.yaml" >> "$GITHUB_OUTPUT"
            echo "Using repo-level ignore: .trivyignore.yaml"
          else
            echo "ignorefile=" >> "$GITHUB_OUTPUT"
            echo "No ignore file found"
          fi

      - name: Trivy scan
        if: steps.check-image.outputs.exists == 'true'
        uses: anthony-spruyt/repo-operator/.github/actions/trivy-scan@main
        with:
          scan-type: image
          scanners: misconfig,secret,vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: "true"
          trivyignores: ${{ steps.trivyconfig.outputs.ignorefile }}
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest
          image-name: ${{ matrix.image }}
          category: trivy-daily-${{ matrix.image }}
