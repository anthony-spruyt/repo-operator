---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
# See https://github.com/anthony-spruyt/repo-operator/blob/main/src/templates/.github/workflows/ci.yaml for template comments
name: "CI"

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      skip_approval:
        description: "Skip approval gate (emergency only)"
        type: boolean
        default: false

permissions:
  actions: "write"
  contents: "write"
  pull-requests: "write"
  security-events: "write"
  statuses: "write"

jobs:
  lint:
    if: "github.event_name != 'workflow_dispatch'"
    uses: "anthony-spruyt/repo-operator/.github/workflows/_lint.yaml@main"
    secrets: "inherit"

  xfg-plan:
    name: "XFG Plan"
    runs-on: "ubuntu-latest"
    needs:
      - "lint"
    # Run on push (after lint passes), PRs, or manual dispatch (lint skipped)
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && needs.lint.result == 'success'))
    concurrency:
      group: "xfg"
      # IMPORTANT: Must be false to serialize deploys and avoid redundant syncs
      cancel-in-progress: false
    outputs:
      run_sync: "${{ steps.changes.outputs.run_sync }}"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          fetch-depth: 0

      - name: "Check for src/ changes since last deploy"
        id: "changes"
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::notice::Manual dispatch - forcing sync"
            echo "run_sync=true" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ vars.LAST_XFG_DEPLOY_SHA }}" ]; then
            echo "::notice::No prior deploy recorded - forcing sync"
            echo "run_sync=true" >> "$GITHUB_OUTPUT"
          elif ! git cat-file -e "${{ vars.LAST_XFG_DEPLOY_SHA }}" 2>/dev/null; then
            echo "::notice::Prior deploy SHA not found in history - forcing sync"
            echo "run_sync=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "${{ vars.LAST_XFG_DEPLOY_SHA }}" HEAD -- src/; then
            echo "::notice::No changes in src/ since last deploy, skipping sync"
            echo "run_sync=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_sync=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "Plan Sync"
        if: "steps.changes.outputs.run_sync == 'true'"
        uses: "anthony-spruyt/xfg@6210fa7b56993232feffef5365f6a946cff7d3f6" # v5.0.1
        with:
          config: "./src/config.yaml"
          dry-run: true
          github-app-id: "${{ vars.APP_ID }}"
          github-app-private-key: "${{ secrets.APP_PRIVATE_KEY }}"

  xfg-apply:
    name: "XFG Apply"
    runs-on: "ubuntu-latest"
    needs:
      - "xfg-plan"
    # Run only on push or manual dispatch (not PRs), and only if plan succeeded
    # !cancelled() breaks the transitive skip chain from lint → xfg-plan → xfg-apply
    if: >-
      !cancelled() &&
      needs.xfg-plan.result == 'success' &&
      needs.xfg-plan.outputs.run_sync == 'true' &&
      github.event_name != 'pull_request'
    environment: "${{ (github.event_name == 'workflow_dispatch' && inputs.skip_approval) && '' || 'production' }}"
    concurrency:
      group: "xfg"
      cancel-in-progress: false
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          fetch-depth: 0

      - name: "Apply Sync"
        uses: "anthony-spruyt/xfg@6210fa7b56993232feffef5365f6a946cff7d3f6" # v5.0.1
        with:
          config: "./src/config.yaml"
          github-app-id: "${{ vars.APP_ID }}"
          github-app-private-key: "${{ secrets.APP_PRIVATE_KEY }}"

  # Summary job for branch protection - add jobs to 'needs' array
  summary:
    needs:
      - "lint"
      - "xfg-plan"
      - "xfg-apply"
    if: "always()"
    uses: "anthony-spruyt/repo-operator/.github/workflows/_summary.yaml@main"
