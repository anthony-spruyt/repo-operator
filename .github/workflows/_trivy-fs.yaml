---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Trivy Vulnerability Scan

on:
  workflow_call:
    inputs:
      trivy-config:
        description: "Path to Trivy config file"
        type: string
        required: false
        default: "trivy.yaml"
      scan-type:
        description: "Trivy scan type (fs, repo, image, etc.)"
        type: string
        required: false
        default: "fs"

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan for vulnerabilities
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Trivy scan
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: ${{ inputs.scan-type }}
          trivy-config: ${{ inputs.trivy-config }}
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: "false"
          exit-code: "0"
          category: trivy-daily-fs
