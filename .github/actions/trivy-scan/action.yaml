---
# Caller requirements:
#   permissions:
#     security-events: write  (SARIF upload to GitHub code scanning)
#     contents: read          (checkout / code access)
#   steps before this action:
#     - actions/checkout      (required for fs scans and trivyignores)
#     - docker/login-action   (if scanning private registry images)
name: Trivy Scan
description: >-
  Scan for vulnerabilities and upload SARIF to GitHub code scanning.
  Zero console output. Supports image, repo and filesystem scans.

inputs:
  scan-type:
    description: "Trivy scan type (image, fs, repo)"
    required: false
    default: "image"
  scanners:
    description: Comma-separated list of Trivy scanners (misconfig,secret,vuln)
    required: false
    default: "misconfig,secret,vuln"
  severity:
    description: Severity levels to report
    required: false
    default: "CRITICAL,HIGH"
  ignore-unfixed:
    description: Ignore vulnerabilities without a fix
    required: false
    default: "true"
  trivyignores:
    description: Path to trivyignore file (leave empty if none)
    required: false
    default: ""
  image-ref:
    description: Docker image reference to scan (required for image scans)
    required: false
    default: ""
  image-name:
    description: Image name to inject into SARIF message (for image scans)
    required: false
    default: ""
  category:
    description: SARIF upload category (must be unique per scan in the same repo/run)
    required: false
    default: "trivy"

runs:
  using: composite
  steps:
    - name: Trivy scan (SARIF with ignores)
      if: ${{ (success() || failure()) && inputs.trivyignores != '' }}
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      with:
        scan-type: ${{ inputs.scan-type }}
        trivy-config: ${{ inputs.trivy-config }}
        scanners: ${{ inputs.scanners }}
        severity: ${{ inputs.severity }}
        ignore-unfixed: ${{ inputs.ignore-unfixed }}
        trivyignores: ${{ inputs.trivyignores }}
        image-ref: ${{ inputs.image-ref }}
        scan-ref: "."
        exit-code: "0"
        format: sarif
        output: trivy-results.sarif

    - name: Trivy scan (SARIF)
      if: ${{ (success() || failure()) && inputs.trivyignores == '' }}
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      with:
        scan-type: ${{ inputs.scan-type }}
        trivy-config: ${{ inputs.trivy-config }}
        scanners: ${{ inputs.scanners }}
        severity: ${{ inputs.severity }}
        ignore-unfixed: ${{ inputs.ignore-unfixed }}
        image-ref: ${{ inputs.image-ref }}
        scan-ref: "."
        exit-code: "0"
        format: sarif
        output: trivy-results.sarif

    - name: Check SARIF exists
      id: sarif-check
      if: ${{ success() || failure() }}
      shell: bash
      run: |
        if [ -f trivy-results.sarif ] && [ -s trivy-results.sarif ]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Inject image name into SARIF
      if: ${{ (success() || failure()) && steps.sarif-check.outputs.exists == 'true' && inputs.image-name != '' }}
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
      run: |
        jq --arg image "$IMAGE_NAME" '
          .runs |= map(.results |= map(
            .message.text = ("Image: " + $image + "\n" + .message.text)
          ))
        ' trivy-results.sarif > trivy-results.tmp && mv trivy-results.tmp trivy-results.sarif

    # Upload SARIF to GitHub code scanning
    - name: Upload SARIF to GitHub Security
      id: sarif-upload
      if: ${{ (success() || failure()) && steps.sarif-check.outputs.exists == 'true' }}
      uses: github/codeql-action/upload-sarif@1065967b50e179b7e74048c2277d849911c549cb
      continue-on-error: true
      with:
        sarif_file: trivy-results.sarif
        category: ${{ inputs.category }}

    - name: Warn on SARIF upload failure
      if: ${{ (success() || failure()) && steps.sarif-upload.outcome == 'failure' }}
      shell: bash
      run: echo "::warning::SARIF upload failed — GitHub Advanced Security may not be enabled for this repository"
