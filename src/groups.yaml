# yaml-language-server: $schema=https://raw.githubusercontent.com/anthony-spruyt/xfg/main/config-schema.json
# Configuration for repo-operator - syncs files to target repositories
groups:
  # c:
  #   files:
  #     TODO
  # "c++":
  #   files:
  #     TODO
  # "c#":
  #   files:
  #     TODO
  docker:
    files:
      .hadolint.yaml:
        createOnly: true
        content: "@templates/.hadolint.yaml"
  github:
    files:
      .github/actionlint.yaml:
        createOnly: true
        header:
          - https://github.com/rhysd/actionlint/blob/main/docs/config.md
          - Ignore shellcheck warnings in all workflows
          - "SC2153: Uppercase env vars from GitHub Actions workflow env blocks"
          - "SC2034: Variables used in heredocs appear unused"
        content: "@templates/.github/actionlint.yaml"
      .pre-commit-config.yaml:
        content:
          repos:
            $arrayMerge: append
            $values:
              - repo: https://github.com/rhysd/actionlint
                # renovate: depName=rhysd/actionlint datasource=github-tags
                rev: v1.7.12
                hooks:
                  - id: actionlint
  github-ci:
    extends: github
    files:
      .devcontainer/devcontainer.json:
        content:
          customizations:
            vscode:
              extensions:
                $arrayMerge: append
                $values:
                  - "github.vscode-github-actions"
      .github/workflows/ci.yaml:
        createOnly: true
        schemaUrl: https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
        header: See https://github.com/anthony-spruyt/repo-operator/blob/main/src/templates/.github/workflows/ci.yaml for template comments
        content: "@templates/.github/workflows/ci.yaml"
  github-trivy:
    extends: github
    files:
      .github/workflows/trivy-scan.yaml:
        schemaUrl: https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
        header: See https://github.com/anthony-spruyt/repo-operator/blob/main/src/templates/.github/workflows/trivy-scan.yaml for template comments
        content: "@templates/.github/workflows/trivy-scan.yaml"
      .trivy-images.yaml:
        createOnly: true
        header: Container images to scan daily with Trivy (empty list = skip image scanning)
        content: "@templates/.trivy-images.yaml"
    settings:
      labels:
        critical:
          color: "#b60205"
          description: "Critical severity"
        high:
          color: "#d93f0b"
          description: "High severity"
        medium:
          color: "#fbca04"
          description: "Medium severity"
        trivy:
          color: "#0052cc"
          description: "Trivy scan finding"
  go:
    files:
      .devcontainer/devcontainer.json:
        content:
          features:
            "ghcr.io/devcontainers/features/go":
              version: "1.26.2"
          customizations:
            vscode:
              extensions:
                $arrayMerge: append
                $values:
                  - "golang.go"
      .pre-commit-config.yaml:
        content:
          repos:
            $arrayMerge: append
            $values:
              - repo: https://github.com/Lucas-C/pre-commit-hooks
                # renovate: depName=Lucas-C/pre-commit-hooks datasource=github-tags
                rev: v1.5.6
                hooks:
                  - id: remove-crlf
                  - id: remove-tabs
                    args: [--whitespaces-count, "2"]
                    exclude: '(\.go|go\.mod|go\.sum)$'
  megalinter:
    files:
      .lycheeignore:
        createOnly: true
        content: "@templates/.lycheeignore"
      .mega-linter.yml:
        createOnly: true
        schemaUrl: https://raw.githubusercontent.com/oxsecurity/megalinter/main/megalinter/descriptors/schemas/megalinter-configuration.jsonschema.json
        header:
          - Project-specific MegaLinter configuration
          - Extends the base config from repo-operator
          - Add custom linters or overrides below
          - "Add project-specific linters below:"
          - "ENABLE_LINTERS:"
          - "  - TYPESCRIPT_ES"
          - "  - PYTHON_PYLINT"
        content: "@templates/.mega-linter.yml"
      .mega-linter-base.yml:
        schemaUrl: https://raw.githubusercontent.com/oxsecurity/megalinter/main/megalinter/descriptors/schemas/megalinter-configuration.jsonschema.json
        header:
          - Base MegaLinter configuration synced from repo-operator
          - This file is automatically updated - do not modify directly
          - To add custom linters, modify .mega-linter.yml instead
        content: "@templates/.mega-linter-base.yml"
      .secretlintignore:
        createOnly: true
        content: "@templates/.secretlintignore"
      .shellcheckrc:
        createOnly: true
      lint-config.sh:
        createOnly: true
        content: "@templates/lint-config.sh"
      lint.sh:
        content: "@templates/lint.sh"
  private-repo:
    settings:
      repo:
        privateVulnerabilityReporting: false
        secretScanning: false
        secretScanningPushProtection: false
        visibility: private
      rulesets:
        inherit: false
  protected-main-branch:
    files:
      .github/CODEOWNERS:
        content: "@templates/.github/CODEOWNERS"
    settings:
      rulesets:
        pr-rules:
          bypassActors:
            $arrayMerge: append
            $values:
              - actorId: 2740 # renovate
                actorType: Integration
                bypassMode: always
              - actorId: 2758555 # repo-operator
                actorType: Integration
                bypassMode: always
          conditions:
            refName:
              include:
                - "refs/heads/main"
              exclude: []
          enforcement: active
          rules:
            $arrayMerge: append
            $values:
              - type: code_quality
                parameters:
                  severity: errors
              - type: code_scanning
                parameters:
                  codeScanningTools:
                    - tool: CodeQL
                      alertsThreshold: errors
                      securityAlertsThreshold: high_or_higher
              - type: pull_request
                parameters:
                  allowedMergeMethods:
                    - squash
                  dismissStaleReviewsOnPush: true
                  requireCodeOwnerReview: true
                  requiredApprovingReviewCount: 0
                  requiredReviewers: []
                  requiredReviewThreadResolution: true
                  requireLastPushApproval: false
          target: branch
  python:
    files:
      .pylintrc:
        createOnly: true
  renovate:
    files:
      .devcontainer/devcontainer.json:
        content:
          features:
            "ghcr.io/devcontainers-extra/features/renovate-cli":
              version: "43.122.0"
      .github/renovate.json5:
        content: "@templates/.github/renovate.json5"
    settings:
      labels:
        "renovate/devcontainer":
          color: "#ededed"
          description: ""
        "renovate/flux":
          color: "#ededed"
          description: ""
        "renovate/helm":
          color: "#ededed"
          description: ""
        "renovate/helm-values":
          color: "#ededed"
          description: ""
        "renovate/image":
          color: "#ededed"
          description: ""
        "renovate/kubernetes":
          color: "#ededed"
          description: ""
        "renovate/npm":
          color: "#ededed"
          description: ""
        "renovate/pre-commit":
          color: "#ededed"
          description: ""
        "renovate/renovate-cli":
          color: "#ededed"
          description: ""
        "renovate/script":
          color: "#ededed"
          description: ""
        "renovate/talos":
          color: "#ededed"
          description: ""
        "renovate/taskfile":
          color: "#ededed"
          description: ""
  terraform:
    files:
      .devcontainer/devcontainer.json:
        content:
          features:
            "ghcr.io/devcontainers/features/terraform":
              version: "1.14.8"
          mounts:
            $arrayMerge: append
            $values:
              - "source=${localEnv:HOME}/.secrets/.terraform.d,target=/home/vscode/.terraform.d,type=bind,readonly"
          customizations:
            vscode:
              extensions:
                $arrayMerge: append
                $values:
                  - "hashicorp.terraform"
      .pre-commit-config.yaml:
        content:
          repos:
            $arrayMerge: append
            $values:
              # NOTE: files pattern assumes infra/terraform/ directory structure - override per-repo if needed
              - repo: https://github.com/antonbabenko/pre-commit-terraform
                # renovate: depName=antonbabenko/pre-commit-terraform datasource=github-tags
                rev: v1.105.0
                hooks:
                  - id: terraform_fmt
                    files: "^(infra/terraform|coder)/"
                  - id: terraform_tflint
                    files: "^(infra/terraform|coder)/"
      .vscode/settings.json:
        createOnly: false
        content:
          "[terraform]":
            "editor.defaultFormatter": "hashicorp.terraform"
  typescript:
    files:
      .eslintrc.json:
        content: "@templates/.eslintrc.json"

conditionalGroups:
  - when:
      noneOf: [go]
    files:
      .pre-commit-config.yaml:
        content:
          repos:
            $arrayMerge: append
            $values:
              - repo: https://github.com/Lucas-C/pre-commit-hooks
                # renovate: depName=Lucas-C/pre-commit-hooks datasource=github-tags
                rev: v1.5.6
                hooks:
                  - id: remove-crlf
                  - id: remove-tabs
                    args: [--whitespaces-count, "2"]
  - when:
      anyOf: [megalinter, github-trivy]
    files:
      trivy.yaml:
        schemaUrl: https://raw.githubusercontent.com/aquasecurity/trivy/main/schema/trivy-config.json
        header:
          - This file is automatically updated - do not modify directly
          - https://trivy.dev/latest/docs/references/configuration/config-file/
        content: "@templates/trivy.yaml"
      .trivyignore.yaml:
        createOnly: true
        header:
          - Path-specific trivy ignores
          - https://trivy.dev/latest/docs/configuration/filtering
        content: "@templates/.trivyignore.yaml"
  - when:
      allOf: [protected-main-branch, github-ci]
    settings:
      rulesets:
        pr-rules:
          rules:
            $arrayMerge: append
            $values:
              - type: required_status_checks
                parameters:
                  doNotEnforceOnCreate: false
                  requiredStatusChecks:
                    - context: "summary / Check Results"
                  strictRequiredStatusChecksPolicy: true
  - when:
      allOf: [renovate]
      anyOf: [github, github-ci, github-trivy]
    settings:
      labels:
        "renovate/github-actions":
          color: "#ededed"
          description: ""
  - when:
      allOf: [renovate, megalinter]
    settings:
      labels:
        "renovate/megalinter-flavor":
          color: "#ededed"
          description: ""
  - when:
      allOf: [renovate, python]
    settings:
      labels:
        "renovate/python":
          color: "#ededed"
          description: ""
  - when:
      allOf: [renovate, terraform]
    settings:
      labels:
        "renovate/terraform":
          color: "#ededed"
          description: ""
