# yaml-language-server: $schema=https://raw.githubusercontent.com/anthony-spruyt/xfg/main/config-schema.json
# Configuration for repo-operator - syncs files to target repositories
repos:
  #- git: https://github.com/anthony-spruyt/bai2csv.git

  - git: https://github.com/anthony-spruyt/claude-plugins.git
    groups:
      - claude
      - mcp
      - github-ci
      - github-trivy
      - megalinter
      - mergify
      - protected-main-branch
      - python
      - renovate
    files:
      .devcontainer/devcontainer.json:
        content:
          customizations:
            vscode:
              extensions:
                $arrayMerge: append
                $values:
                  - "jetmartin.bats"

  - git: https://github.com/anthony-spruyt/container-images.git
    groups:
      - claude
      - mcp
      - github-ci
      - github-trivy
      - megalinter
      - protected-main-branch
      - docker
      - python
      - mergify
      - renovate
    files:
      .github/renovate.json5:
        content:
          extends:
            $arrayMerge: append
            $values:
              - "local>anthony-spruyt/container-images//.github/renovate-overrides.json5"
      .github/renovate-overrides.json5:
        createOnly: true
        content: "@templates/.github/renovate-overrides.json5"
    settings:
      labels:
        "renovate/upstream":
          color: "#ededed"
          description: ""
      rulesets:
        tag-rules:
          bypassActors:
            $arrayMerge: append
            $values:
              - actorId: 3215096 # container-images-garbo
                actorType: Integration
                bypassMode: always

  - git: https://github.com/anthony-spruyt/esphome.git
    groups:
      - claude
      - mcp
      - mergify
      - renovate
    files:
      .devcontainer/devcontainer.json:
        content:
          customizations:
            vscode:
              extensions:
                $arrayMerge: append
                $values:
                  - "ESPHome.esphome-vscode"
      .vscode/settings.json:
        content:
          files.associations:
            "*.yaml": "esphome"
          esphome.dashboard.url: "http://localhost:6052"

  - git: https://github.com/anthony-spruyt/firemerge.git
    groups:
      - claude
      - mcp
      - github-ci
      - github-trivy
      - megalinter
      - protected-main-branch
      - docker
      - python
      - mergify
      - renovate

  - git: https://github.com/anthony-spruyt/repo-operator.git
    groups:
      - claude
      - mcp
      - github-ci
      - github-trivy
      - megalinter
      - mergify
      - renovate

  - git: https://github.com/anthony-spruyt/spruyt-labs.git
    groups:
      - claude
      - mcp
      - github-ci
      - github-trivy
      - megalinter
      - docker
      - go
      - terraform
      - biome
      - mergify
      - renovate
    files:
      .devcontainer/devcontainer.json:
        content:
          customizations:
            vscode:
              extensions:
                $arrayMerge: append
                $values:
                  - "jetmartin.bats"
                  - "task.vscode-task"
                  - "tim-koehler.helm-intellisense"
          features:
            "ghcr.io/devcontainers-extra/features/sops":
              version: "3.12.2"
            "ghcr.io/eitsupi/devcontainer-features/jq-likes":
              yqVersion: "4.52.5"
          mounts:
            $arrayMerge: append
            $values:
              - "source=$${localEnv:HOME}/.secrets/age.key,target=/home/vscode/.secrets/age.key,type=bind,readonly"
              - "source=$${localEnv:HOME}/.secrets/bgp-65000.conf,target=/home/vscode/.secrets/bgp-65000.conf,type=bind,readonly"
              - "source=$${localEnv:HOME}/.secrets/kubeconfig,target=/home/vscode/.secrets/kubeconfig,type=bind,readonly"
              - "source=$${localEnv:HOME}/.secrets/talosconfig,target=/home/vscode/.secrets/talosconfig,type=bind"
          portsAttributes:
            "3333":
              label: "Capacitor"
              onAutoForward: "openBrowser"
          runArgs:
            $arrayMerge: append
            $values:
              - "--env-file"
              - "$${localEnv:HOME}/.secrets/.env.spruyt-labs"
      .github/renovate.json5:
        content:
          ignorePaths:
            - "talos/helmfile"
          extends:
            $arrayMerge: append
            $values:
              - "local>anthony-spruyt/spruyt-labs//.github/renovate-overrides.json5"
      .github/renovate-overrides.json5:
        createOnly: true
        content: "@templates/.github/renovate-overrides.json5"
      .vscode/settings.json:
        content:
          "search.exclude":
            "**/*.secret.*": true
            "**/temp/**": true
      .mcp.json:
        content:
          mcpServers:
            cclsp:
              type: "stdio"
              command: "cclsp"
              env:
                CCLSP_CONFIG_PATH: "/workspaces/spruyt-labs/.claude/cclsp.json"
      .mdformat.toml:
        content: |
          wrap = 400
          number = true
          end_of_line = "lf"

          # Python 3.13+ only
          exclude = [
              "cluster/apps/n8n-system/n8n/app/prompts/**",
          ]
      .pre-commit-config.yaml:
        content:
          repos:
            $arrayMerge: append
            $values:
              - repo: https://github.com/k8s-at-home/sops-pre-commit
                # renovate: depName=k8s-at-home/sops-pre-commit datasource=github-tags
                rev: v2.1.1
                hooks:
                  - id: forbid-secrets
      .yamllint.yml:
        content:
          ignore: |
            *.sops.*
            talos/
            clusterconfig/
            legacy/
            .taskfiles/talos/scripts/
      biome.json:
        content:
          files:
            includes: ["ts/**/src/**/*.ts"]
      trivy-mega-linter.yaml:
        content:
          scan:
            skip-dirs:
              - talos/clusterconfig
    settings:
      repo:
        allowAutoMerge: false
      labels:
        alert:
          color: "#e11d48"
          description: "Auto-created alert triage issue"
        sre:
          color: "#7c3aed"
          description: "SRE investigation or triage"

  - git: https://github.com/anthony-spruyt/SunGather.git
    groups:
      - claude
      - mcp
      - github-ci
      - github-trivy
      - megalinter
      - protected-main-branch
      - docker
      - python
      - mergify
      - renovate
    files:
      .mcp.json:
        content:
          mcpServers:
            cclsp:
              type: "stdio"
              command: "cclsp"
              env:
                CCLSP_CONFIG_PATH: "/workspaces/SunGather/.claude/cclsp.json"

  - git: https://github.com/anthony-spruyt/xfg.git
    groups:
      - claude
      - mcp
      - github-ci
      - github-trivy
      - megalinter
      - protected-main-branch
      - python
      - eslint
      - mergify
      - renovate
    files:
      .devcontainer/devcontainer.json:
        content:
          features:
            "ghcr.io/devcontainers/features/azure-cli": {}
          runArgs:
            $arrayMerge: append
            $values:
              - "--env-file"
              - "$${localEnv:HOME}/.secrets/.env.xfg"
      .vscode/settings.json:
        content:
          "files.exclude":
            "dist/": true
            "node_modules/": true
            "site/": true
            "tmp/": true
          "search.exclude":
            "coverage": true
            ".output": true
      .mcp.json:
        content:
          mcpServers:
            cclsp:
              type: "stdio"
              command: "cclsp"
              env:
                CCLSP_CONFIG_PATH: "/workspaces/xfg/.claude/cclsp.json"
    settings:
      repo:
        hasDiscussions: true
      labels:
        "run-integration":
          color: "#0E8A16"
          description: "Trigger integration tests on this PR"
      rulesets:
        pr-rules:
          bypassActors:
            $arrayMerge: append
            $values:
              - actorId: 2719952 # xfg release bot
                actorType: Integration
                bypassMode: always
        tag-rules:
          bypassActors:
            $arrayMerge: append
            $values:
              - actorId: 2719952 # xfg release bot
                actorType: Integration
                bypassMode: always
