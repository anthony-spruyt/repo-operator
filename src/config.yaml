# yaml-language-server: $schema=https://raw.githubusercontent.com/anthony-spruyt/xfg/main/config-schema.json
# Configuration for repo-operator - syncs files to target repositories
id: repo-operator
deleteOrphaned: true
prOptions:
  merge: auto
  mergeStrategy: squash
  deleteBranch: true

repos:
  #- git: https://github.com/anthony-spruyt/bai2csv.git

  - git: https://github.com/anthony-spruyt/claude-config.git
    groups:
      - devcontainer
      - github-ci
      - github-trivy
      - renovate
      - pre-commit
      - megalinter
      - protected-main-branch
    files:
      .devcontainer/devcontainer.json:
        content:
          customizations:
            vscode:
              extensions:
                $arrayMerge: append
                $values:
                  - "jetmartin.bats"
      .eslintrc.json: false
      .hadolint.yaml: false

  - git: https://github.com/anthony-spruyt/claude-plugins.git
    groups:
      - devcontainer
      - pre-commit
    prOptions:
      merge: direct
    settings:
      rulesets:
        inherit: false

  - git: https://github.com/anthony-spruyt/container-images.git
    groups:
      - devcontainer
      - github-ci
      - github-trivy
      - renovate
      - pre-commit
      - megalinter
      - protected-main-branch
    files:
      .github/workflows/trivy-scan.yaml:
        createOnly: true
      .eslintrc.json: false

  #- git: https://github.com/anthony-spruyt/esphome.git

  #- git: https://github.com/anthony-spruyt/firemerge.git

  #- git: https://github.com/anthony-spruyt/gastown-dev.git

  - git: https://github.com/anthony-spruyt/repo-operator.git
    groups:
      - devcontainer
      - github-ci
      - github-trivy
      - renovate
      - pre-commit
      - megalinter
    files:
      .eslintrc.json: false
      .hadolint.yaml: false
      .pylintrc: false
    prOptions:
      merge: direct
    settings:
      rulesets:
        inherit: false

  - git: https://github.com/anthony-spruyt/spruyt-labs.git
    groups:
      - devcontainer
      - github-ci
      - github-trivy
      - renovate
      - pre-commit
      - megalinter
      - private-repo
    prOptions:
      merge: direct
    files:
      .devcontainer/devcontainer.json:
        content:
          features:
            "ghcr.io/devcontainers-extra/features/sops": {}
            "ghcr.io/eitsupi/devcontainer-features/jq-likes":
              yqVersion: "latest"
            "ghcr.io/devcontainers/features/terraform": {}
            "ghcr.io/devcontainers-extra/features/renovate-cli": {}
          mounts:
            $arrayMerge: append
            $values:
              - "source=${localEnv:HOME}/.secrets/.terraform.d,target=/home/vscode/.terraform.d,type=bind,readonly"
              - "source=${localEnv:HOME}/.secrets,target=/home/vscode/.secrets,type=bind,readonly"
              - "source=${localEnv:HOME}/.secrets/talosconfig,target=/home/vscode/.secrets/talosconfig,type=bind"
          customizations:
            vscode:
              extensions:
                $arrayMerge: append
                $values:
                  - "task.vscode-task"
                  - "tim-koehler.helm-intellisense"
                  - "hashicorp.terraform"
                  - "github.vscode-github-actions"
          portsAttributes:
            "3333":
              label: "Capacitor"
              onAutoForward: "openBrowser"
      .vscode/settings.json:
        createOnly: false
        content:
          "search.exclude":
            "**/*.secret.*": true
            "**/temp/**": true
          "[terraform]":
            "editor.defaultFormatter": "hashicorp.terraform"
      .yamllint.yml:
        content:
          ignore: |
            *.sops.*
            talos/
            clusterconfig/
            legacy/
            .taskfiles/talos/scripts/
      trivy.yaml:
        content:
          scan:
            skip-dirs:
              - talos/clusterconfig
      .pre-commit-config.yaml:
        content:
          repos:
            $arrayMerge: append
            $values:
              - repo: https://github.com/k8s-at-home/sops-pre-commit
                rev: v2.1.1
                hooks:
                  - id: forbid-secrets
              - repo: https://github.com/antonbabenko/pre-commit-terraform
                rev: v1.105.0
                hooks:
                  - id: terraform_fmt
                    files: ^infra/terraform/
                  - id: terraform_tflint
                    files: ^infra/terraform/
      .github/renovate.json5:
        content:
          ignorePaths:
            - "talos/helmfile"
      .eslintrc.json: false
      .hadolint.yaml: false
      .pylintrc: false
    settings:
      repo:
        allowAutoMerge: false
      rulesets:
        inherit: false
      labels:
        alert:
          color: "#e11d48"
          description: "Auto-created alert triage issue"
        "renovate/github-actions":
          color: "#ededed"
          description: ""
        "renovate/helm":
          color: "#ededed"
          description: ""
        "renovate/helm-values":
          color: "#ededed"
          description: ""
        "renovate/image":
          color: "#ededed"
          description: ""
        "renovate/kubernetes":
          color: "#ededed"
          description: ""
        "renovate/talos":
          color: "#ededed"
          description: ""
        "renovate/terraform":
          color: "#ededed"
          description: ""
        "renovate/taskfile":
          color: "#ededed"
          description: ""
        sre:
          color: "#7c3aed"
          description: "SRE investigation or triage"

  #- git: https://github.com/anthony-spruyt/SunGather.git

  - git: https://github.com/anthony-spruyt/xfg.git
    groups:
      - devcontainer
      - github-ci
      - github-trivy
      - renovate
      - pre-commit
      - megalinter
      - protected-main-branch
    files:
      .devcontainer/devcontainer.json:
        content:
          features:
            "ghcr.io/devcontainers/features/python":
              "version": "latest"
            "ghcr.io/devcontainers/features/azure-cli": {}
      .vscode/settings.json:
        createOnly: false
        content:
          "files.exclude":
            "dist/": true
            "node_modules/": true
            "site/": true
            "tmp/": true
          "search.exclude":
            "coverage": true
            ".output": true
      .hadolint.yaml: false
      .pylintrc: false
      trivy.yaml:
        content:
          scan:
            $arrayMerge: replace
            scanners:
              - vuln
              - secret
    settings:
      repo:
        hasDiscussions: true
      rulesets:
        pr-rules:
          bypassActors:
            - actorId: 2719952
              actorType: Integration
              bypassMode: always
            - actorId: 2740
              actorType: Integration
              bypassMode: always
        tag-rules:
          bypassActors:
            - actorId: 2719952
              actorType: Integration
              bypassMode: always

groups:
  devcontainer:
    files:
      .devcontainer/devcontainer.json:
        content: "@templates/.devcontainer/devcontainer.json"
      .devcontainer/package.json:
        content: "@templates/.devcontainer/package.json"
      .devcontainer/initialize.sh:
        content: "@templates/.devcontainer/initialize.sh"
      .devcontainer/post-create.sh:
        content: "@templates/.devcontainer/post-create.sh"
      .devcontainer/setup-devcontainer.sh:
        createOnly: true
        content: "@templates/.devcontainer/setup-devcontainer.sh"
      .pre-commit-config.yaml:
        schemaUrl: https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/pre-commit-config.json
        content: "@templates/.pre-commit-config.yaml"
      .yamllint.yml:
        schemaUrl: https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/yamllint.json
        header:
          - This file is automatically updated - do not modify directly
          - https://yamllint.readthedocs.io/en/latest/configuration.html
        content: "@templates/.yamllint.yml"
      .gitleaks.toml:
        createOnly: true
        content: "@templates/.gitleaks.toml"
      .markdownlint.json:
        content: "@templates/.markdownlint.json"
      .markdownlintignore:
        createOnly: true
        content: "@templates/.markdownlintignore"
      .github/actionlint.yaml:
        createOnly: true
        header:
          - https://github.com/rhysd/actionlint/blob/main/docs/config.md
          - Ignore shellcheck warnings in all workflows
          - "SC2153: Uppercase env vars from GitHub Actions workflow env blocks"
          - "SC2034: Variables used in heredocs appear unused"
        content: "@templates/.github/actionlint.yaml"
  github-ci:
    files:
      .github/workflows/ci.yaml:
        createOnly: true
        schemaUrl: https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
        header: See https://github.com/anthony-spruyt/repo-operator/blob/main/src/templates/.github/workflows/ci.yaml for template comments
        content: "@templates/.github/workflows/ci.yaml"
      .github/actionlint.yaml:
        createOnly: true
        header:
          - https://github.com/rhysd/actionlint/blob/main/docs/config.md
          - Ignore shellcheck warnings in all workflows
          - "SC2153: Uppercase env vars from GitHub Actions workflow env blocks"
          - "SC2034: Variables used in heredocs appear unused"
        content: "@templates/.github/actionlint.yaml"
  github-trivy:
    files:
      .github/workflows/trivy-scan.yaml:
        createOnly: true
        schemaUrl: https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
        header: See https://github.com/anthony-spruyt/repo-operator/blob/main/src/templates/.github/workflows/trivy-scan.yaml for template comments
        content: "@templates/.github/workflows/trivy-scan.yaml"
      .github/actionlint.yaml:
        createOnly: true
        header:
          - https://github.com/rhysd/actionlint/blob/main/docs/config.md
          - Ignore shellcheck warnings in all workflows
          - "SC2153: Uppercase env vars from GitHub Actions workflow env blocks"
          - "SC2034: Variables used in heredocs appear unused"
        content: "@templates/.github/actionlint.yaml"
      .trivyignore.yaml:
        createOnly: true
        header:
          - Path-specific trivy ignores
          - https://trivy.dev/latest/docs/configuration/filtering
        content: "@templates/.trivyignore.yaml"
      trivy.yaml:
        schemaUrl: https://raw.githubusercontent.com/aquasecurity/trivy/main/schema/trivy-config.json
        header:
          - This file is automatically updated - do not modify directly
          - https://trivy.dev/latest/docs/references/configuration/config-file/
        content: "@templates/trivy.yaml"
    settings:
      labels:
        critical:
          color: "#b60205"
          description: "Critical severity"
        high:
          color: "#d93f0b"
          description: "High severity"
        medium:
          color: "#fbca04"
          description: "Medium severity"
        trivy:
          color: "#0052cc"
          description: "Trivy scan finding"
  renovate:
    files:
      .github/renovate.json5:
        content: "@templates/.github/renovate.json5"
    settings:
      labels:
        "renovate/devcontainer":
          color: "#ededed"
          description: ""
        "renovate/github-actions":
          color: "#ededed"
          description: ""
        "renovate/helm":
          color: "#ededed"
          description: ""
        "renovate/image":
          color: "#ededed"
          description: ""
        "renovate/megalinter-flavor":
          color: "#ededed"
          description: ""
        "renovate/npm":
          color: "#ededed"
          description: ""
        "renovate/pre-commit":
          color: "#ededed"
          description: ""
        "renovate/script":
          color: "#ededed"
          description: ""
        "renovate/talos":
          color: "#ededed"
          description: ""
        "renovate/taskfile":
          color: "#ededed"
          description: ""
        "renovate/terraform":
          color: "#ededed"
          description: ""
  pre-commit:
    files:
      .pre-commit-config.yaml:
        schemaUrl: https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/pre-commit-config.json
        content: "@templates/.pre-commit-config.yaml"
      .yamllint.yml:
        schemaUrl: https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/yamllint.json
        header:
          - This file is automatically updated - do not modify directly
          - https://yamllint.readthedocs.io/en/latest/configuration.html
        content: "@templates/.yamllint.yml"
      .gitleaks.toml:
        createOnly: true
        content: "@templates/.gitleaks.toml"
      .markdownlint.json:
        content: "@templates/.markdownlint.json"
      .markdownlintignore:
        createOnly: true
        content: "@templates/.markdownlintignore"
      .github/actionlint.yaml:
        createOnly: true
        header:
          - https://github.com/rhysd/actionlint/blob/main/docs/config.md
          - Ignore shellcheck warnings in all workflows
          - "SC2153: Uppercase env vars from GitHub Actions workflow env blocks"
          - "SC2034: Variables used in heredocs appear unused"
        content: "@templates/.github/actionlint.yaml"
  megalinter:
    files:
      .eslintrc.json:
        content: "@templates/.eslintrc.json"
      .gitleaks.toml:
        createOnly: true
        content: "@templates/.gitleaks.toml"
      .hadolint.yaml:
        createOnly: true
        content: "@templates/.hadolint.yaml"
      .lycheeignore:
        createOnly: true
        content: "@templates/.lycheeignore"
      .markdownlint.json:
        content: "@templates/.markdownlint.json"
      .markdownlintignore:
        createOnly: true
        content: "@templates/.markdownlintignore"
      .mega-linter.yml:
        createOnly: true
        schemaUrl: https://raw.githubusercontent.com/oxsecurity/megalinter/main/megalinter/descriptors/schemas/megalinter-configuration.jsonschema.json
        header:
          - Project-specific MegaLinter configuration
          - Extends the base config from repo-operator
          - Add custom linters or overrides below
          - "Add project-specific linters below:"
          - "ENABLE_LINTERS:"
          - "  - TYPESCRIPT_ES"
          - "  - PYTHON_PYLINT"
        content: "@templates/.mega-linter.yml"
      .mega-linter-base.yml:
        schemaUrl: https://raw.githubusercontent.com/oxsecurity/megalinter/main/megalinter/descriptors/schemas/megalinter-configuration.jsonschema.json
        header:
          - Base MegaLinter configuration synced from repo-operator
          - This file is automatically updated - do not modify directly
          - To add custom linters, modify .mega-linter.yml instead
        content: "@templates/.mega-linter-base.yml"
      .pylintrc:
        createOnly: true
      .secretlintignore:
        createOnly: true
        content: "@templates/.secretlintignore"
      .shellcheckrc:
        createOnly: true
      trivy.yaml:
        schemaUrl: https://raw.githubusercontent.com/aquasecurity/trivy/main/schema/trivy-config.json
        header:
          - This file is automatically updated - do not modify directly
          - https://trivy.dev/latest/docs/references/configuration/config-file/
        content: "@templates/trivy.yaml"
      .trivyignore.yaml:
        createOnly: true
        header:
          - Path-specific trivy ignores
          - https://trivy.dev/latest/docs/configuration/filtering
        content: "@templates/.trivyignore.yaml"
      .yamllint.yml:
        schemaUrl: https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/yamllint.json
        header:
          - This file is automatically updated - do not modify directly
          - https://yamllint.readthedocs.io/en/latest/configuration.html
        content: "@templates/.yamllint.yml"
      lint-config.sh:
        createOnly: true
        content: "@templates/lint-config.sh"
      lint.sh:
        content: "@templates/lint.sh"
  protected-main-branch:
    files:
      .github/CODEOWNERS:
        content: "@templates/.github/CODEOWNERS"
    settings:
      rulesets:
        pr-rules:
          bypassActors:
            - actorId: 2740
              actorType: Integration
              bypassMode: always
          conditions:
            refName:
              include:
                - "refs/heads/main"
              exclude: []
          enforcement: active
          rules:
            - type: code_quality
              parameters:
                severity: errors
            - type: code_scanning
              parameters:
                codeScanningTools:
                  - tool: CodeQL
                    alertsThreshold: errors
                    securityAlertsThreshold: high_or_higher
            - type: pull_request
              parameters:
                allowedMergeMethods:
                  - squash
                dismissStaleReviewsOnPush: true
                requireCodeOwnerReview: true
                requiredApprovingReviewCount: 0
                requiredReviewers: []
                requiredReviewThreadResolution: true
                requireLastPushApproval: false
            - type: required_status_checks
              parameters:
                doNotEnforceOnCreate: false
                requiredStatusChecks:
                  - context: "summary / Check Results"
                strictRequiredStatusChecksPolicy: true
          target: branch
  private-repo:
    settings:
      repo:
        privateVulnerabilityReporting: false
        secretScanning: false
        secretScanningPushProtection: false
        visibility: private

  # typescript:
  #   files:
  #     TODO
  # docker:
  #   files:
  #     TODO

files:
  .vscode/settings.json:
    createOnly: true
    content: "@templates/.vscode/settings.json"
  .prettierignore:
    content: "@templates/.prettierignore"
  .prettierrc.yaml:
    schemaUrl: https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/prettierrc.json
    header: This file is automatically updated - do not modify directly
    content: "@templates/.prettierrc.yaml"
  .editorconfig:
    content: "@templates/.editorconfig"
  .gitignore:
    createOnly: true
    content: "@templates/.gitignore"
  LICENSE:
    createOnly: true
    content: "@templates/LICENSE.MIT"

settings:
  deleteOrphaned: true
  labels:
    blocked:
      color: "#B60205"
      description: "Waiting on upstream fix or external dependency"
    bug:
      color: "#d73a4a"
      description: "Something isn't working"
    chore:
      color: "#FEF2C0"
      description: "Maintenance, refactoring, configs"
    "dep/major":
      color: "#ededed"
      description: ""
    "dep/minor":
      color: "#ededed"
      description: ""
    "dep/patch":
      color: "#ededed"
      description: ""
    dependencies:
      color: "#0366d6"
      description: "Pull requests that update a dependency file"
    docker:
      color: "#21ceff"
      description: "Pull requests that update docker code"
    documentation:
      color: "#0075ca"
      description: "Improvements or additions to documentation"
    duplicate:
      color: "#cfd3d7"
      description: "This issue or pull request already exists"
    enhancement:
      color: "#a2eeef"
      description: "New feature or request"
    "github actions":
      color: "#000000"
      description: "Pull requests that update GitHub Actions code"
    "good first issue":
      color: "#7057ff"
      description: "Good for newcomers"
    "help wanted":
      color: "#008672"
      description: "Extra attention is needed"
    invalid:
      color: "#e4e669"
      description: "This doesn't seem right"
    question:
      color: "#d876e3"
      description: "Further information is requested"
    security:
      color: "#d73a4a"
      description: "Security vulnerability"
    wontfix:
      color: "#ffffff"
      description: "This will not be worked on"
  repo:
    allowAutoMerge: true
    allowForking: true
    allowMergeCommit: false
    allowRebaseMerge: false
    allowSquashMerge: true
    allowUpdateBranch: true
    archived: false
    automatedSecurityFixes: false
    defaultBranch: main
    deleteBranchOnMerge: true
    hasDiscussions: false
    hasIssues: true
    hasProjects: false
    hasWiki: false
    isTemplate: false
    mergeCommitMessage: PR_TITLE
    mergeCommitTitle: MERGE_MESSAGE
    privateVulnerabilityReporting: true
    secretScanning: true
    secretScanningPushProtection: true
    squashMergeCommitMessage: COMMIT_MESSAGES
    squashMergeCommitTitle: COMMIT_OR_PR_TITLE
    visibility: public
    vulnerabilityAlerts: false
    webCommitSignoffRequired: true
  rulesets:
    push-protection:
      bypassActors: []
      conditions:
        refName:
          include:
            - "refs/heads/main"
          exclude: []
      enforcement: active
      rules:
        - type: creation
        - type: deletion
        - type: non_fast_forward
        - type: required_linear_history
      target: branch
    branch-signatures:
      bypassActors: []
      conditions:
        refName:
          include:
            - "refs/heads/**"
          exclude: []
      enforcement: active
      rules:
        - type: required_signatures
      target: branch
    tag-rules:
      conditions:
        refName:
          include:
            - "refs/tags/**"
          exclude: []
      enforcement: active
      rules:
        - type: deletion
        - type: non_fast_forward
        - type: required_signatures
      target: tag
